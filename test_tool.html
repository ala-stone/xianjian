<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仙剑H5接口测试工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        .content {
            padding: 30px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        textarea {
            font-family: 'Courier New', monospace;
            resize: vertical;
            min-height: 100px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            box-shadow: none;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .result-box {
            background: #f8f9fa;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        .result-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .result-title.success {
            color: #52c41a;
        }
        .result-title.error {
            color: #ff4d4f;
        }
        .result-content {
            background: white;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #e1e8ed;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        .tips {
            background: #fffbe6;
            border: 1px solid #ffe58f;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .tips-title {
            font-weight: 600;
            color: #d46b08;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tips-content {
            font-size: 13px;
            color: #d46b08;
            line-height: 1.6;
        }
        .tab {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e1e8ed;
        }
        .tab-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }
        .tab-btn.active {
            color: #667eea;
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 仙剑H5接口测试工具</h1>
            <p>捕获并测试真实的接口请求</p>
        </div>
        
        <div class="content">
            <div class="tips">
                <div class="tips-title">💡 使用提示</div>
                <div class="tips-content">
                    1. 此工具仅用于测试接口是否可用<br>
                    2. 请确保你已经能够手动登录和签到<br>
                    3. 测试完成后，复制接口信息发送给我，我会帮你修改脚本
                </div>
            </div>

            <div class="tab">
                <button class="tab-btn active" onclick="switchTab('login')">登录测试</button>
                <button class="tab-btn" onclick="switchTab('signin')">签到测试</button>
            </div>

            <!-- 登录测试 -->
            <div id="login" class="tab-content active">
                <div class="section">
                    <div class="section-title">🔐 登录接口配置</div>
                    
                    <div class="form-group">
                        <label>接口地址 (URL)</label>
                        <input type="text" id="loginUrl" placeholder="https://api.example.com/login" value="https://h5.qingcigame.com/api/login">
                    </div>

                    <div class="grid">
                        <div class="form-group">
                            <label>账号</label>
                            <input type="text" id="username" placeholder="请输入账号">
                        </div>
                        <div class="form-group">
                            <label>密码</label>
                            <input type="password" id="password" placeholder="请输入密码">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Content-Type</label>
                        <select id="loginContentType">
                            <option value="application/json">application/json</option>
                            <option value="application/x-www-form-urlencoded">application/x-www-form-urlencoded</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>请求体模板 (JSON)</label>
                        <textarea id="loginBody" placeholder='{"account": "xxx", "password": "xxx"}'>{
  "login_type": "password",
  "account": "你的账号",
  "password": "你的密码",
  "server": "formal"
}</textarea>
                    </div>

                    <button class="btn" onclick="testLogin()">🚀 测试登录</button>

                    <div class="result-box" id="loginResult" style="display: none;">
                        <div class="result-title" id="loginResultTitle">测试结果</div>
                        <div class="result-content" id="loginResultContent"></div>
                    </div>
                </div>
            </div>

            <!-- 签到测试 -->
            <div id="signin" class="tab-content">
                <div class="section">
                    <div class="section-title">✅ 签到接口配置</div>
                    
                    <div class="form-group">
                        <label>接口地址 (URL)</label>
                        <input type="text" id="signinUrl" placeholder="https://api.example.com/signin" value="https://h5.qingcigame.com/api/signin">
                    </div>

                    <div class="form-group">
                        <label>认证 Token</label>
                        <input type="text" id="token" placeholder="Bearer xxx 或直接粘贴 token">
                    </div>

                    <div class="form-group">
                        <label>Content-Type</label>
                        <select id="signinContentType">
                            <option value="application/json">application/json</option>
                            <option value="application/x-www-form-urlencoded">application/x-www-form-urlencoded</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>请求体模板 (JSON)</label>
                        <textarea id="signinBody" placeholder='{"server": "formal"}'>{
  "server": "formal"
}</textarea>
                    </div>

                    <button class="btn" onclick="testSignin()">🚀 测试签到</button>

                    <div class="result-box" id="signinResult" style="display: none;">
                        <div class="result-title" id="signinResultTitle">测试结果</div>
                        <div class="result-content" id="signinResultContent"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById(tab).classList.add('active');
        }

        async function testLogin() {
            const url = document.getElementById('loginUrl').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const contentType = document.getElementById('loginContentType').value;
            let bodyTemplate = document.getElementById('loginBody').value;

            const resultBox = document.getElementById('loginResult');
            const resultTitle = document.getElementById('loginResultTitle');
            const resultContent = document.getElementById('loginResultContent');

            resultBox.style.display = 'block';
            resultContent.textContent = '正在测试...';

            try {
                // 替换模板中的变量
                bodyTemplate = bodyTemplate
                    .replace(/你的账号/g, username)
                    .replace(/your_account/g, username)
                    .replace(/你的密码/g, password)
                    .replace(/your_password/g, password);

                let body;
                let headers = {
                    'Content-Type': contentType,
                    'User-Agent': 'Mozilla/5.0 (iPhone; CPU iPhone OS 14_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/14.0 Mobile/15E148 Safari/604.1'
                };

                if (contentType === 'application/json') {
                    body = bodyTemplate;
                } else {
                    // 如果是 form-urlencoded，需要转换
                    const bodyObj = JSON.parse(bodyTemplate);
                    body = Object.keys(bodyObj)
                        .map(key => encodeURIComponent(key) + '=' + encodeURIComponent(bodyObj[key]))
                        .join('&');
                }

                const response = await fetch(url, {
                    method: 'POST',
                    headers: headers,
                    body: body
                });

                const text = await response.text();
                
                let responseJson;
                try {
                    responseJson = JSON.parse(text);
                } catch (e) {
                    responseJson = { raw: text };
                }

                const result = {
                    status: response.status,
                    statusText: response.statusText,
                    url: url,
                    method: 'POST',
                    headers: {
                        'Content-Type': contentType
                    },
                    request_body: body,
                    response: responseJson
                };

                resultContent.textContent = JSON.stringify(result, null, 2);

                if (response.ok && responseJson.success) {
                    resultTitle.textContent = '✅ 登录成功';
                    resultTitle.className = 'result-title success';
                    
                    // 保存 token
                    if (responseJson.data && responseJson.data.token) {
                        document.getElementById('token').value = responseJson.data.token;
                        alert('登录成功！Token 已自动填充到签到测试页面。\n\n请点击"签到测试"标签测试签到接口。');
                    }
                } else {
                    resultTitle.textContent = '❌ 登录失败';
                    resultTitle.className = 'result-title error';
                    alert('登录失败，请检查接口地址和参数配置。\n\n可能是接口地址不正确，建议使用浏览器开发者工具捕获真实接口。');
                }

            } catch (error) {
                resultTitle.textContent = '❌ 测试出错';
                resultTitle.className = 'result-title error';
                resultContent.textContent = '错误信息：\n' + error.message;
                alert('请求出错：' + error.message + '\n\n建议：\n1. 检查网络连接\n2. 使用浏览器开发者工具捕获真实接口\n3. 参考 INTERFACE_GUIDE.md 中的详细说明');
            }
        }

        async function testSignin() {
            const url = document.getElementById('signinUrl').value;
            const token = document.getElementById('token').value;
            const contentType = document.getElementById('signinContentType').value;
            let bodyTemplate = document.getElementById('signinBody').value;

            const resultBox = document.getElementById('signinResult');
            const resultTitle = document.getElementById('signinResultTitle');
            const resultContent = document.getElementById('signinResultContent');

            if (!token) {
                alert('请先完成登录测试，或者手动输入 Token');
                return;
            }

            resultBox.style.display = 'block';
            resultContent.textContent = '正在测试...';

            try {
                let body;
                let headers = {
                    'Content-Type': contentType,
                    'User-Agent': 'Mozilla/5.0 (iPhone; CPU iPhone OS 14_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/14.0 Mobile/15E148 Safari/604.1'
                };

                // 添加认证头
                if (token.startsWith('Bearer ') || token.startsWith('bearer ')) {
                    headers['Authorization'] = token;
                } else {
                    headers['Authorization'] = 'Bearer ' + token;
                }

                if (contentType === 'application/json') {
                    body = bodyTemplate;
                } else {
                    const bodyObj = JSON.parse(bodyTemplate);
                    body = Object.keys(bodyObj)
                        .map(key => encodeURIComponent(key) + '=' + encodeURIComponent(bodyObj[key]))
                        .join('&');
                }

                const response = await fetch(url, {
                    method: 'POST',
                    headers: headers,
                    body: body
                });

                const text = await response.text();
                
                let responseJson;
                try {
                    responseJson = JSON.parse(text);
                } catch (e) {
                    responseJson = { raw: text };
                }

                const result = {
                    status: response.status,
                    statusText: response.statusText,
                    url: url,
                    method: 'POST',
                    headers: headers,
                    request_body: body,
                    response: responseJson
                };

                resultContent.textContent = JSON.stringify(result, null, 2);

                if (response.ok) {
                    resultTitle.textContent = '✅ 请求成功';
                    resultTitle.className = 'result-title success';
                    
                    if (responseJson.success) {
                        alert('签到成功！\n\n请复制完整的测试结果（包括 URL、Headers、Body 等信息）发送给我，我会帮你修改脚本。');
                    } else {
                        alert('请求成功但返回错误：' + (responseJson.message || '未知错误'));
                    }
                } else {
                    resultTitle.textContent = '❌ 请求失败';
                    resultTitle.className = 'result-title error';
                    alert('请求失败，状态码：' + response.status + '\n\n可能是接口地址不正确或参数有误。');
                }

            } catch (error) {
                resultTitle.textContent = '❌ 测试出错';
                resultTitle.className = 'result-title error';
                resultContent.textContent = '错误信息：\n' + error.message;
                alert('请求出错：' + error.message);
            }
        }

        // 初始化
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
    </script>
</body>
</html>
